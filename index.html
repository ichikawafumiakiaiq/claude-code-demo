<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 講習会 デモ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-4xl mx-auto p-8">

    <header class="mb-12 text-center">
      <h1 class="text-4xl font-bold text-gray-900 mb-4">Claude Code 講習会 デモ</h1>
      <p class="text-gray-600">指示するだけで、変更から PR まで</p>
    </header>

    <section class="mb-12">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6">参加者のページ</h2>
      <ul class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!--
          受講者の皆さんへ：
          自分のページを作ったら、以下の形式で1行追加してください。
          Claudeに「index.htmlの参加者リンク一覧に、私のページ <名前>.html を追加して」と頼んでもOKです。
        -->
        <li>
          <a href="participants/_template.html"
             class="block p-4 bg-white rounded-lg shadow hover:shadow-md transition text-blue-600">
            サンプル（テンプレ）
          </a>
        </li>
      </ul>
    </section>

    <footer class="mt-16 text-center text-gray-500 text-sm">
      <p>Claude Code 講習会 第２回 / Powered by Claude Code</p>
    </footer>

  </div>
</body>
</html>
